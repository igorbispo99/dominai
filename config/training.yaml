game:
  num_players: 4
  mode: block            # block | draw
  team_mode: false        # true = teams (even seats vs odd seats)

model:
  name: mlp               # mlp | resnet
  hidden_sizes: [256, 256]
  activation: relu
  dropout: 0.0

training:
  episodes: 100000
  batch_size: 64
  buffer_size: 100000
  warmup_steps: 1000
  gamma: 0.99
  lr: 0.001
  grad_clip: 10.0
  target_sync_every: 1000
  epsilon:
    start: 1.0
    end: 0.05
    decay_episodes: 50000
  eval_every: 1000
  eval_games: 100
  checkpoint_every: 5000
  checkpoint_dir: ./checkpoints/run01
  seed: 42
  device: cpu
